name: Modern Ecommerce CI/CD

on:
  push:
    branches:
      - develop
      - main

env:
  REGISTRY: ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}

jobs:

  build-and-push-staging:
    name: Build & Push Staging Images
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Project Dependencies
        run: npm install

      - name: Run Application Build
        run: npm run build

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Build Staging Docker Image
        run: |
          docker build \
            -t $REGISTRY/web:staging-${{ github.sha }} \
            -t $REGISTRY/web:staging-latest .

      - name: Push Staging Docker Image
        run: |
          docker push $REGISTRY/web:staging-${{ github.sha }}
          docker push $REGISTRY/web:staging-latest

  build-and-push-production:
    name: Build & Push Production Images
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Project Dependencies
        run: npm install

      - name: Run Application Build
        run: npm run build

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Build Production Docker Image
        run: |
          docker build \
            -t $REGISTRY/web:prod-${{ github.sha }} \
            -t $REGISTRY/web:latest .

      - name: Push Production Docker Image
        run: |
          docker push $REGISTRY/web:prod-${{ github.sha }}
          docker push $REGISTRY/web:latest